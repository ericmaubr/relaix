<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>relaix — Sources</title>
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; font-size: 13px; background: #f5f6f8; color: #1f2430; }

  header { background: #23324a; color: #fff; padding: 11px 20px; display: flex; align-items: center; gap: 16px; position: relative; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; white-space: nowrap; }
  header .version { font-size: 11px; color: rgba(255,255,255,.35); margin-left: auto; }

  .hamburger { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; cursor: pointer; border-radius: 5px; color: #fff; flex: none; }
  .hamburger:hover { background: rgba(255,255,255,.12); }
  .hamburger svg { width: 16px; height: 16px; }

  #auth-panel {
    display: none; position: absolute; top: 46px; left: 8px; z-index: 30;
    background: #fff; color: #1f2430; border: 1px solid #d3d7de; border-radius: 8px;
    min-width: 230px; box-shadow: 0 8px 24px rgba(0,0,0,.16); padding: 14px;
  }
  #auth-panel.open { display: block; }
  #auth-panel .nav-links { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eaecf0; }
  #auth-panel .nav-links a { display: flex; align-items: center; gap: 9px; padding: 8px 8px; font-size: 13px; border-radius: 6px; text-decoration: none; color: #1f2430; }
  #auth-panel .nav-links a:hover { background: #eef3f8; }
  #auth-panel .nav-links a.current { color: #23324a; font-weight: 600; }
  #auth-panel .nav-links a .dot { width: 6px; height: 6px; border-radius: 50%; background: #c2c7d0; flex: none; }
  #auth-panel .nav-links a.current .dot { background: #23324a; }
  #auth-panel .sb-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #888; margin-bottom: 8px; }
  #auth-panel .sb-status { font-size: 11px; margin-top: 7px; color: #888; line-height: 1.4; }
  #auth-panel .sb-btn-row { display: flex; gap: 6px; margin-top: 7px; }
  #auth-panel .sb-btn { flex: 1; padding: 6px 0; border-radius: 5px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s; }
  #auth-panel .sb-btn.primary { background: #23324a; color: #fff; }
  #auth-panel .sb-btn.primary:hover { background: #324567; }
  #auth-panel .sb-btn.secondary { background: #f0f2f5; color: #444; border: 1px solid #d0d5dd; }
  #auth-panel .sb-btn.secondary:hover { background: #e4e8ef; }
  #auth-panel input[type=password] { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; font-family: monospace; background: #fff; }
  #auth-panel input[type=password]:focus { outline: none; border-color: #23324a; box-shadow: 0 0 0 2px rgba(35,50,74,.12); }

  .toolbar { display: flex; align-items: center; gap: 10px; padding: 12px 20px; background: #fff; border-bottom: 1px solid #e2e5eb; flex-wrap: wrap; }
  .toolbar input[type="text"] { padding: 6px 10px; border: 1px solid #d3d7de; border-radius: 4px; font-size: 13px; width: 260px; }
  .toolbar button { padding: 6px 14px; border: 1px solid #23324a; background: #23324a; color: #fff; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .toolbar button:hover { background: #324567; }
  .toolbar button.secondary { background: #fff; color: #23324a; }
  .toolbar button.secondary:hover { background: #eef3f8; }
  .toolbar .status { font-size: 12px; color: #6b7280; margin-left: auto; }

  .alert { margin: 12px 20px 0; border-radius: 6px; padding: 8px 12px; font-size: 12px; line-height: 1.4; }
  .alert.ok { background: #e8f5e9; border-left: 4px solid #2e7d32; color: #1b5e20; }
  .alert.error { background: #fdecea; border-left: 4px solid #c62828; color: #7f0000; }
  .hidden { display: none !important; }

  .form-panel { margin: 12px 20px 0; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); padding: 14px 16px; }
  .form-panel h2 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #23324a; margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px solid #eaecf0; }
  .form-panel .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .form-panel label { display: block; max-width: 280px; flex: 1; min-width: 180px; }
  .form-panel label span { display: block; font-size: 11px; color: #666; margin-bottom: 3px; }
  .form-panel input[type=text], .form-panel input[type=number], .form-panel select {
    width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; background: #fff;
  }
  .form-panel input:focus, .form-panel select:focus { outline: none; border-color: #23324a; box-shadow: 0 0 0 2px rgba(35,50,74,.12); }
  .form-actions { display: flex; gap: 8px; margin-top: 12px; }

  #grid-wrap { padding: 16px 20px; }
  #grid { height: calc(100vh - 150px); width: 100%; --ag-font-size: 12.6px; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 99px; background: #eef3f8; color: #23324a; white-space: nowrap; }
  .tag.off { background: #f5f5f5; color: #aaa; }
  .tag.on { background: #e8f5e9; color: #1b5e20; }
  .btn-icon { border: 1px solid #d8dee6; background: #fff; border-radius: 3px; cursor: pointer; font-size: 13px; color: #555; padding: 1px 5px; line-height: 1.5; margin-right: 3px; }
  .btn-icon:hover { background: #eaf0f7; border-color: #23324a; color: #23324a; }
</style>
</head>
<body>

<header>
  <button class="hamburger" id="btn-menu" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div id="auth-panel">
    <div class="nav-links">
      <a href="." class="current"><span class="dot"></span>Sources</a>
      <a href="rules-ui"><span class="dot"></span>Rules</a>
      <a href="history-ui"><span class="dot"></span>History</a>
    </div>
    <div class="sb-title">Authentication</div>
    <input id="token-input" type="password" placeholder="Bearer token"
           autocomplete="off" onkeydown="if(event.key==='Enter') saveToken()">
    <div class="sb-btn-row">
      <button class="sb-btn primary" onclick="saveToken()">Connect</button>
      <button class="sb-btn secondary" onclick="clearToken()">Sign out</button>
    </div>
    <div class="sb-status" id="token-status"></div>
  </div>
  <h1>relaix — Sources</h1>
  <span class="version" id="app-version"></span>
</header>

<div id="alert" class="alert hidden"></div>

<div id="content" class="hidden">

  <div class="toolbar">
    <input type="text" id="quick-search" placeholder="Search any field...">
    <button onclick="openNewForm()">+ New source</button>
    <button class="secondary" id="btn-clear-filters">Clear filters</button>
    <span class="status" id="count-status"></span>
  </div>

  <div id="form-panel" class="form-panel hidden">
    <h2 id="form-title">New source</h2>
    <form id="source-form" onsubmit="submitSource(event)">
      <input type="hidden" id="f-id">
      <div class="row">
        <label><span>Name</span><input type="text" id="f-name" required></label>
        <label><span>Kind</span>
          <select id="f-kind"><option value="webhook_site">webhook_site</option></select>
        </label>
        <label><span>Polling interval (seconds)</span>
          <input type="number" id="f-interval" min="10" value="300" required>
        </label>
        <label><span>Max content attempts</span>
          <input type="number" id="f-max-content-attempts" min="1" max="99" value="3" required>
        </label>
      </div>
      <div class="row" style="margin-top: 10px;">
        <label><span>API base URL</span><input type="text" id="f-api-url" placeholder="https://webhook.site" required></label>
        <label><span>API key</span><input type="text" id="f-api-token"></label>
        <label><span>Channel / token id</span><input type="text" id="f-channel-id"></label>
      </div>
      <div class="form-actions">
        <button type="button" class="secondary" onclick="closeForm()">Cancel</button>
        <button type="submit" id="btn-submit">Create</button>
      </div>
    </form>
  </div>

  <div id="grid-wrap">
    <div id="grid" class="ag-theme-quartz"></div>
  </div>

</div>

<script>
  let TOKEN = localStorage.getItem('relaix_token') || '';
  let gridApi;
  let _data = [];

  fetch('version').then(r => r.json()).then(d => {
    document.getElementById('app-version').textContent = 'v' + d.version;
  }).catch(() => {});

  document.getElementById('btn-menu').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('auth-panel').classList.toggle('open');
  });
  document.addEventListener('click', () => document.getElementById('auth-panel').classList.remove('open'));
  document.getElementById('auth-panel').addEventListener('click', (e) => e.stopPropagation());

  function cellActions(params) {
    if (!params.data) return '';
    const toggleLabel = params.data.active ? 'Deactivate' : 'Activate';
    return `<button type="button" class="btn-icon" onclick="editSource('${params.data.id}')" title="Edit">✎</button>` +
           `<button type="button" class="btn-icon" onclick="toggleActive('${params.data.id}', ${!params.data.active})" title="${toggleLabel}">${params.data.active ? '⏸' : '▶'}</button>` +
           `<button type="button" class="btn-icon" onclick="deleteSource('${params.data.id}')" title="Delete">🗑</button>`;
  }

  function cellActive(params) {
    if (!params.data) return '';
    return params.data.active ? '<span class="tag on">active</span>' : '<span class="tag off">inactive</span>';
  }

  const columns = [
    { colId: 'actions', headerName: '', width: 110, pinned: 'left', cellRenderer: cellActions, sortable: false, filter: false, resizable: false, suppressMovable: true },
    { field: 'name', headerName: 'Name', flex: 1, minWidth: 180 },
    { field: 'kind', headerName: 'Kind', width: 130 },
    { field: 'api_url', headerName: 'API base URL', flex: 1, minWidth: 200 },
    { field: 'channel_id', headerName: 'Channel / token id', width: 180 },
    { field: 'polling_interval_seconds', headerName: 'Interval (s)', width: 120 },
    { field: 'max_content_attempts', headerName: 'Max attempts', width: 120 },
    { field: 'last_processed_cursor', headerName: 'Last cursor', width: 180 },
    { field: 'active', headerName: 'Status', width: 110, cellRenderer: cellActive, valueGetter: p => p.data ? (p.data.active ? 'active' : 'inactive') : '' },
  ];

  columns.forEach(c => {
    if (!c.cellRenderer || c.field) { c.filter = true; c.sortable = true; c.floatingFilter = true; }
  });

  const gridOptions = {
    columnDefs: columns,
    rowData: [],
    defaultColDef: { resizable: true, sortable: true, filter: true },
    animateRows: true,
    enableCellTextSelection: true,
    ensureDomOrder: true,
    pagination: true,
    paginationPageSize: 100,
    onFilterChanged: () => updateCount(),
    onGridReady: () => updateCount(),
    onModelUpdated: () => updateCount(),
  };

  function updateCount() {
    if (!gridApi) return;
    const total = _data.length;
    const shown = gridApi.getDisplayedRowCount();
    document.getElementById('count-status').textContent =
      shown === total ? `${total} source(s)` : `${shown} of ${total} source(s)`;
  }

  function saveToken() {
    const v = document.getElementById('token-input').value.trim();
    if (!v) return;
    TOKEN = v;
    localStorage.setItem('relaix_token', v);
    document.getElementById('auth-panel').classList.remove('open');
    load();
  }

  function clearToken() {
    TOKEN = '';
    localStorage.removeItem('relaix_token');
    document.getElementById('content').classList.add('hidden');
    document.getElementById('token-status').textContent = '';
    document.getElementById('token-input').value = '';
    showAlert('', '');
  }

  async function api(method, path, body) {
    const r = await fetch(path, {
      method,
      headers: {
        'Authorization': 'Bearer ' + TOKEN,
        ...(body ? { 'Content-Type': 'application/json' } : {}),
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (r.status === 204) return null;
    const data = await r.json().catch(() => ({ detail: r.statusText }));
    if (!r.ok) throw new Error(data.detail || r.statusText);
    return data;
  }

  async function load() {
    const st = document.getElementById('token-status');
    st.style.color = '#888'; st.textContent = 'Loading...';
    try {
      _data = await api('GET', 'sources');
      document.getElementById('content').classList.remove('hidden');
      st.style.color = '#2e7d32';
      st.textContent = '✓ ' + _data.length + ' source(s)';
      if (!gridApi) {
        gridApi = agGrid.createGrid(document.getElementById('grid'), gridOptions);
        document.getElementById('quick-search').addEventListener('input', (e) => {
          gridApi.setGridOption('quickFilterText', e.target.value);
          updateCount();
        });
        document.getElementById('btn-clear-filters').addEventListener('click', () => {
          gridApi.setFilterModel(null);
          document.getElementById('quick-search').value = '';
          gridApi.setGridOption('quickFilterText', '');
        });
      }
      gridApi.setGridOption('rowData', _data);
    } catch (e) {
      st.style.color = '#c62828';
      st.textContent = '✗ ' + e.message;
    }
  }

  function openNewForm() {
    document.getElementById('form-title').textContent = 'New source';
    document.getElementById('btn-submit').textContent = 'Create';
    document.getElementById('source-form').reset();
    document.getElementById('f-id').value = '';
    document.getElementById('f-interval').value = 300;
    document.getElementById('f-max-content-attempts').value = 3;
    document.getElementById('form-panel').classList.remove('hidden');
    document.getElementById('grid-wrap').classList.add('hidden');
    document.getElementById('f-name').focus();
    showAlert('', '');
  }

  function editSource(id) {
    const s = _data.find(d => d.id === id);
    if (!s) return;
    document.getElementById('form-title').textContent = 'Edit source';
    document.getElementById('btn-submit').textContent = 'Save';
    document.getElementById('f-id').value = s.id;
    document.getElementById('f-name').value = s.name;
    document.getElementById('f-kind').value = s.kind;
    document.getElementById('f-interval').value = s.polling_interval_seconds;
    document.getElementById('f-max-content-attempts').value = s.max_content_attempts;
    document.getElementById('f-api-url').value = s.api_url;
    document.getElementById('f-api-token').value = s.api_token || '';
    document.getElementById('f-channel-id').value = s.channel_id || '';
    document.getElementById('form-panel').classList.remove('hidden');
    document.getElementById('grid-wrap').classList.add('hidden');
    document.getElementById('f-name').focus();
    showAlert('', '');
  }

  function closeForm() {
    document.getElementById('form-panel').classList.add('hidden');
    document.getElementById('grid-wrap').classList.remove('hidden');
    document.getElementById('source-form').reset();
  }

  async function submitSource(e) {
    e.preventDefault();
    const id = document.getElementById('f-id').value;
    const payload = {
      name: document.getElementById('f-name').value,
      kind: document.getElementById('f-kind').value,
      api_url: document.getElementById('f-api-url').value,
      api_token: document.getElementById('f-api-token').value || null,
      channel_id: document.getElementById('f-channel-id').value || null,
      polling_interval_seconds: parseInt(document.getElementById('f-interval').value, 10),
      max_content_attempts: parseInt(document.getElementById('f-max-content-attempts').value, 10),
    };
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    try {
      if (id) {
        await api('PATCH', 'sources/' + id, payload);
      } else {
        await api('POST', 'sources', payload);
      }
      closeForm();
      await load();
    } catch (err) {
      showAlert('error', err.message);
    } finally {
      btn.disabled = false;
    }
  }

  async function toggleActive(id, newActive) {
    try {
      await api('PATCH', 'sources/' + id, { active: newActive });
      await load();
    } catch (err) {
      showAlert('error', err.message);
    }
  }

  async function deleteSource(id) {
    const s = _data.find(d => d.id === id);
    const name = (s && s.name) || id;
    if (!confirm(`Delete "${name}"? This does not delete events already recorded from it.`)) return;
    try {
      await api('DELETE', 'sources/' + id);
      await load();
    } catch (err) {
      showAlert('error', err.message);
    }
  }

  function showAlert(kind, msg) {
    const el = document.getElementById('alert');
    if (!kind || !msg) { el.classList.add('hidden'); return; }
    el.className = 'alert ' + kind;
    el.textContent = msg;
    el.classList.remove('hidden');
    if (kind === 'ok') setTimeout(() => el.classList.add('hidden'), 4000);
  }

  if (TOKEN) {
    document.getElementById('token-input').value = TOKEN;
    load();
  }
</script>

</body>
</html>
