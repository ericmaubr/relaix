# example-api.conf - relaix HTTP server configuration
# Copy to api.conf and fill in real values.
# WARNING: never commit api.conf with real tokens/passwords.

[api]
host         = 127.0.0.1
port         = 8790
bearer_token =                      ; empty = service runs without authentication (local/dev use)

[db]
; production: Postgres
url = postgresql+psycopg://relaix_app:PASSWORD@localhost:5432/relaix
; local dev: comment out the line above to use SQLite at ~/.relaix/relaix.db
