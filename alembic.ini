# DEVELOPMENT-only config — used by `alembic revision --autogenerate` when
# creating a new migration. In production/deploy, migrations are applied via
# `python -m relaix migrate`, which reads the scripts packaged under
# `src/relaix/alembic/` (no repo checkout or this file needed) — see
# `src/relaix/migrations.py`.

[alembic]
# Migrations (env.py, versions/) live inside the package, not a loose
# alembic/ folder at the repo root — so the same files are used both here
# (dev) and by the packaged module (production), without duplication.
script_location = %(here)s/src/relaix/alembic

prepend_sys_path = .

path_separator = os

sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
